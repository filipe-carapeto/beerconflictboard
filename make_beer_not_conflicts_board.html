<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🍺 Make Beer, Not Conflicts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #f5c542;
    }

    .board {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #2c2c2c;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .add {
      background: #4caf50;
      color: white;
    }

    .reset {
      background: #f44336;
      color: white;
    }

    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
      margin-right: 10px;
    }
  </style>
</head>
<body>

<h1>🍺 Make Beer, Not Conflicts</h1>
<p>5 scratches = 1 free beer 🍻</p>

<div>
  <input id="nameInput" placeholder="Dev name" />
  <button onclick="addDev()" class="add">Add Dev</button>
</div>

<div class="board" id="board"></div>

<script>
  const STORAGE_KEY = 'beerBoard';

  function loadData() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function render() {
    const board = document.getElementById('board');
    const data = loadData();
    board.innerHTML = '';

    data.forEach((dev, index) => {
      const beers = Math.floor(dev.scratches / 5);
      const scratches = dev.scratches % 5;

      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <h3>${dev.name}</h3>
        <p>Scratches: ${'| '.repeat(scratches)}</p>
        <p>🍺 Beers earned: ${beers}</p>
        <button onclick="addScratch(${index})">+ Scratch</button>
        <button onclick="resetDev(${index})" class="reset">Reset</button>
      `;

      board.appendChild(card);
    });
  }

  function addDev() {
    const input = document.getElementById('nameInput');
    const name = input.value.trim();
    if (!name) return;

    const data = loadData();
    data.push({ name, scratches: 0 });
    saveData(data);

    input.value = '';
    render();
  }

  function addScratch(index) {
    const data = loadData();
    data[index].scratches++;
    saveData(data);
    render();
  }

  function resetDev(index) {
    const data = loadData();
    data[index].scratches = 0;
    saveData(data);
    render();
  }

  render();
</script>

</body>
</html>
