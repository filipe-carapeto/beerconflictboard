<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🍺 Make Beer, Not Conflicts</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    h1 { color: #f5c542; }

    .board {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #2c2c2c;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .add { background: #4caf50; color: white; }
    .reset { background: #f44336; color: white; }

    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
      margin-right: 10px;
    }
  </style>
</head>
<body>

<h1>🍺 Make Beer, Not Conflicts</h1>
<p>5 scratches = 1 free beer 🍻</p>

<div>
  <input id="nameInput" placeholder="Dev name" />
  <button onclick="addDev()" class="add">Add Dev</button>
</div>

<div class="board" id="board"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCRQ3Y-x-D_jKSiYkfGrcxVa3X2QHqX4G8",
  authDomain: "beer-board-2.firebaseapp.com",
  projectId: "beer-board-2",
  storageBucket: "beer-board-2.firebasestorage.app",
  messagingSenderId: "907342938334",
  appId: "1:907342938334:web:81dd7ff6fb3d4f7f07c24f"
};

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const collection = db.collection('beerBoard');

  function render(snapshot) {
    const board = document.getElementById('board');
    board.innerHTML = '';

    snapshot.forEach(doc => {
      const dev = doc.data();
      const id = doc.id;

      const beers = Math.floor(dev.scratches / 5);
      const scratches = dev.scratches % 5;

      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <h3>${dev.name}</h3>
        <p>Scratches: ${'| '.repeat(scratches)}</p>
        <p>🍺 Beers earned: ${beers}</p>
        <button onclick="addScratch('${id}')">+ Scratch</button>
        <button onclick="resetDev('${id}')" class="reset">Reset</button>
      `;

      board.appendChild(card);
    });
  }

  function addDev() {
    const input = document.getElementById('nameInput');
    const name = input.value.trim();
    if (!name) return;

    collection.add({ name, scratches: 0 });
    input.value = '';
  }

  function addScratch(id) {
    const ref = collection.doc(id);
    ref.update({ scratches: firebase.firestore.FieldValue.increment(1) });
  }

  function resetDev(id) {
    const ref = collection.doc(id);
    ref.update({ scratches: 0 });
  }

  // 🔁 Real-time updates
  collection.onSnapshot(render);
</script>

</body>
</html>
