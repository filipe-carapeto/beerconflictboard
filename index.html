<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🍺 Make Beer, Not Conflicts</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    h1 { color: #f5c542; }

    .board {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #2c2c2c;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .add { background: #4caf50; color: white; }
    .reset { background: #f44336; color: white; }

    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
      margin-right: 10px;
    }
  </style>
</head>
<body>

<h1>🍺 Make Beer, Not Conflicts</h1>
<p>5 scratches = 1 free beer 🍻</p>

<div>
  <input id="nameInput" placeholder="Dev name" />
  <button onclick="addDev()" class="add">Add Dev</button>
</div>

<div class="board" id="board"></div>

<script>
  // 🔥 TODO: replace with your Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    appId: "YOUR_APP_ID" // ⚠️ REQUIRED
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const collection = db.collection('beerBoard');

  function render(snapshot) {
    const board = document.getElementById('board');
    board.innerHTML = '';

    snapshot.forEach(doc => {
      const dev = doc.data();
      const id = doc.id;

      const beers = Math.floor(dev.scratches / 5);
      const total = dev.scratches;

      function getTally(n) {
        const container = document.createElement('div');
        container.style.display = 'flex';
        container.style.flexWrap = 'wrap';
        container.style.gap = '6px';

        const groups = Math.floor(n / 5);
        const remainder = n % 5;

        function createGroup(isFull) {
          const g = document.createElement('div');
          g.style.position = 'relative';
          g.style.width = '30px';
          g.style.height = '20px';

          const lines = isFull ? 4 : remainder;

          for (let i = 0; i < lines; i++) {
            const line = document.createElement('div');
            line.style.position = 'absolute';
            line.style.left = `${i * 6}px`;
            line.style.top = '0';
            line.style.width = '2px';
            line.style.height = '100%';
            line.style.background = 'white';
            g.appendChild(line);
          }

          if (isFull) {
            const slash = document.createElement('div');
            slash.style.position = 'absolute';
            slash.style.left = '0';
            slash.style.top = '0';
            slash.style.width = '100%';
            slash.style.height = '2px';
            slash.style.background = 'white';
            slash.style.transform = 'rotate(25deg)';
            slash.style.transformOrigin = 'left center';
            g.appendChild(slash);
          }

          return g;
        }

        for (let i = 0; i < groups; i++) {
          container.appendChild(createGroup(true));
        }

        if (remainder > 0) {
          const g = document.createElement('div');
          g.style.position = 'relative';
          g.style.width = '30px';
          g.style.height = '20px';

          for (let i = 0; i < remainder; i++) {
            const line = document.createElement('div');
            line.style.position = 'absolute';
            line.style.left = `${i * 6}px`;
            line.style.top = '0';
            line.style.width = '2px';
            line.style.height = '100%';
            line.style.background = 'white';
            g.appendChild(line);
          }

          container.appendChild(g);
        }

        return container;
      }

      const tally = getTally(total);

      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <h3>${dev.name}</h3>
        <p>Scratches:</p>
        <p>🍺 Beers earned: ${beers}</p>
        <button onclick="addScratch('${id}')">+ Scratch</button>
        <button onclick="resetDev('${id}')" class="reset">Reset</button>
      `;

      card.appendChild(tally);
      board.appendChild(card);
    });
  }

  function addDev() {
    const input = document.getElementById('nameInput');
    const name = input.value.trim();
    if (!name) return;

    collection.add({ name, scratches: 0 });
    input.value = '';
  }

  function addScratch(id) {
    const ref = collection.doc(id);
    ref.update({ scratches: firebase.firestore.FieldValue.increment(1) });
  }

  function resetDev(id) {
    const ref = collection.doc(id);
    ref.update({ scratches: 0 });
  }

  // 🔁 Real-time updates
  collection.onSnapshot(
    (snapshot) => {
      console.log('🔥 Data received:', snapshot.size);
      render(snapshot);
    },
    (error) => {
      console.error('❌ Firestore error:', error);
      alert('Firestore error: ' + error.message);
    }
  );
</script>

</body>
</html>
